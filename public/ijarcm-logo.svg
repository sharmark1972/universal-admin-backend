<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Colorful swirls -->
  <path d="M150 120 Q170 100 190 120 Q210 140 230 120 Q250 100 270 120" fill="none" stroke="#1e90ff" stroke-width="8" stroke-linecap="round"/>
  <path d="M140 130 Q160 110 180 130 Q200 150 220 130 Q240 110 260 130" fill="none" stroke="#ff6347" stroke-width="6" stroke-linecap="round"/>
  <path d="M160 140 Q180 120 200 140 Q220 160 240 140 Q260 120 280 140" fill="none" stroke="#32cd32" stroke-width="6" stroke-linecap="round"/>
  <path d="M170 150 Q190 130 210 150 Q230 170 250 150 Q270 130 290 150" fill="none" stroke="#ffa500" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Globe -->
  <circle cx="180" cy="180" r="25" fill="#32cd32" stroke="#228b22" stroke-width="2"/>
  <path d="M160 180 Q180 160 200 180 Q180 200 160 180" fill="#228b22"/>
  <path d="M170 170 Q180 175 190 170" fill="none" stroke="#228b22" stroke-width="2"/>
  <path d="M170 190 Q180 185 190 190" fill="none" stroke="#228b22" stroke-width="2"/>
  
  <!-- Person with tie -->
  <circle cx="320" cy="150" r="20" fill="#ffa500" stroke="#ff8c00" stroke-width="2"/>
  <rect x="300" y="170" width="40" height="50" rx="20" fill="#ff8c00"/>
  <polygon points="315,180 325,180 320,200" fill="#228b22"/>
  
  <!-- Light bulb -->
  <circle cx="380" cy="120" r="15" fill="#ffd700" stroke="#ffb347" stroke-width="2"/>
  <rect x="375" y="135" width="10" height="8" fill="#ddd"/>
  <path d="M370 110 L375 105 M385 105 L390 110 M375 100 L380 95 M385 95 L390 100" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Open book -->
  <path d="M120 200 Q250 180 380 200 L380 280 Q250 260 120 280 Z" fill="#1e90ff" stroke="#1c86ee" stroke-width="2"/>
  <path d="M250 180 L250 260" stroke="#1c86ee" stroke-width="2"/>
  <path d="M120 200 Q250 220 380 200" fill="none" stroke="#1c86ee" stroke-width="2"/>
  
  <!-- Text -->
  <text x="250" y="320" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#2f5233">INTERNATIONAL</text>
  <text x="250" y="350" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#2f5233">JOURNAL</text>
  <text x="250" y="380" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#2f5233">OF ACADEMIC RESEARCH</text>
  <text x="250" y="405" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#2f5233">IN COMMERCE &amp;</text>
  <text x="250" y="430" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#2f5233">MANAGEMENT</text>
</svg>