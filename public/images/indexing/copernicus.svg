<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="copernicusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="earthGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003399;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#copernicusGrad)" opacity="0.1"/>
  
  <!-- Earth monitoring system -->
  <g transform="translate(100, 100)">
    <!-- Earth -->
    <circle cx="0" cy="0" r="35" fill="url(#earthGrad)"/>
    
    <!-- Continents (simplified) -->
    <path d="M -10,-20 Q -5,-25 0,-20 Q 5,-25 10,-20 L 8,-10 Q 5,-5 0,-8 Q -5,-5 -8,-10 Z" fill="#34A853" opacity="0.7"/>
    <path d="M -15,5 Q -10,0 -5,5 L -3,15 Q -8,18 -13,15 Z" fill="#34A853" opacity="0.7"/>
    <path d="M 5,8 Q 10,5 15,10 L 12,20 Q 7,22 5,18 Z" fill="#34A853" opacity="0.7"/>
    
    <!-- Orbit rings -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#0066CC" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#0066CC" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
    
    <!-- Satellites -->
    <g transform="rotate(45)">
      <rect x="50" y="-3" width="8" height="6" rx="1" fill="#FFD700"/>
      <line x1="46" y1="0" x2="50" y2="0" stroke="#FFD700" stroke-width="1"/>
      <line x1="58" y1="0" x2="62" y2="0" stroke="#FFD700" stroke-width="1"/>
    </g>
    
    <g transform="rotate(135)">
      <rect x="50" y="-3" width="8" height="6" rx="1" fill="#FFD700"/>
      <line x1="46" y1="0" x2="50" y2="0" stroke="#FFD700" stroke-width="1"/>
      <line x1="58" y1="0" x2="62" y2="0" stroke="#FFD700" stroke-width="1"/>
    </g>
    
    <g transform="rotate(225)">
      <rect x="50" y="-3" width="8" height="6" rx="1" fill="#FFD700"/>
      <line x1="46" y1="0" x2="50" y2="0" stroke="#FFD700" stroke-width="1"/>
      <line x1="58" y1="0" x2="62" y2="0" stroke="#FFD700" stroke-width="1"/>
    </g>
    
    <!-- Data transmission lines -->
    <line x1="0" y1="0" x2="50" y2="-25" stroke="#00A5E3" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
    <line x1="0" y1="0" x2="-50" y2="25" stroke="#00A5E3" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#003399">
    Copernicus
  </text>
</svg>
