<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="scribdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A73E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A5E3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#scribdGrad)" opacity="0.1"/>
  
  <!-- Document icon -->
  <g transform="translate(100, 100)">
    <!-- Document body -->
    <rect x="-35" y="-45" width="70" height="90" rx="5" fill="#1A73E8"/>
    <rect x="-32" y="-42" width="64" height="84" rx="3" fill="white" opacity="0.95"/>
    
    <!-- Document lines -->
    <line x1="-25" y1="-30" x2="25" y2="-30" stroke="#1A73E8" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="-18" x2="25" y2="-18" stroke="#00A5E3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-25" y1="-10" x2="15" y2="-10" stroke="#00A5E3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-25" y1="-2" x2="25" y2="-2" stroke="#00A5E3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-25" y1="6" x2="20" y2="6" stroke="#00A5E3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-25" y1="14" x2="25" y2="14" stroke="#00A5E3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-25" y1="22" x2="10" y2="22" stroke="#00A5E3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Read icon (eye) -->
    <ellipse cx="0" cy="30" rx="15" ry="8" fill="none" stroke="#1A73E8" stroke-width="2"/>
    <circle cx="0" cy="30" r="4" fill="#1A73E8"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A73E8">
    Scribd
  </text>
</svg>
