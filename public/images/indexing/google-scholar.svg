<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="googleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34A853;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#googleGrad)" opacity="0.1"/>
  
  <!-- Scholar icon (graduation cap) -->
  <g transform="translate(100, 100)">
    <!-- Cap base -->
    <polygon points="-40,-10 40,-10 35,0 -35,0" fill="#4285F4"/>
    
    <!-- Cap top -->
    <rect x="-50" y="-25" width="100" height="15" rx="2" fill="#4285F4"/>
    
    <!-- Tassel -->
    <line x1="0" y1="-25" x2="25" y2="-40" stroke="#EA4335" stroke-width="3" stroke-linecap="round"/>
    <circle cx="25" cy="-40" r="5" fill="#EA4335"/>
    
    <!-- Book base -->
    <rect x="-30" y="5" width="60" height="40" rx="3" fill="#34A853"/>
    <rect x="-28" y="7" width="56" height="36" rx="2" fill="white" opacity="0.3"/>
    
    <!-- Book pages -->
    <line x1="-20" y1="5" x2="-20" y2="45" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="5" x2="0" y2="45" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="5" x2="20" y2="45" stroke="white" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4285F4">
    Google Scholar
  </text>
</svg>
